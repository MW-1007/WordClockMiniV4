; Word Clock firmware — PlatformIO project configuration
;
; The GPIO assignment strongly suggests an ESP32-C3 board, so that is the
; default environment. Select `esp32dev` instead if the hardware is a classic
; ESP32 DevKit, or replace `board` with the exact PlatformIO board identifier.

[platformio]
default_envs = esp32-c3-devkitm-1

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit NeoPixel
    ayushsharma82/ElegantOTA
build_flags =
    -Wall
    -Wextra
monitor_filters =
    esp32_exception_decoder

[env:esp32-c3-devkitm-1]
board = esp32-c3-devkitm-1
upload_speed = 921600

[env:esp32dev]
board = esp32dev
upload_speed = 921600
